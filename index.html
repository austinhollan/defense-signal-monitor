<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Defense Signal Monitor</title>

  <!--
    ============================================================
    DEFENSE SIGNAL MONITOR — SINGLE PAGE APP
    Loader.js dynamically merges 6 parts into one executed script.
    CRITICAL: Do NOT edit architecture.
    ============================================================
  -->

  <!-- Meta tags -->
  <meta name="description" content="A real-time defense equities and conflict signal dashboard." />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Defense Signal Monitor</h1>
      <p class="subtitle">Real-time defense equities and conflict signals</p>
    </div>
  </header>

  <main>

    <!-- Theater Strip -->
    <section id="theater-strip" class="theater-strip">
      <div class="theater-row" id="theater-row"></div>
    </section>

    <!-- Tabs -->
    <section class="tabs">
      <button class="tab-button active" data-tab="overview">Overview</button>
      <button class="tab-button" data-tab="signals">Signals Feed</button>
      <button class="tab-button" data-tab="matrix">Signal Matrix</button>
      <button class="tab-button" data-tab="etf">ETF Correlation</button>
    </section>

    <!-- Overview Tab -->
    <section id="overview" class="tab-content active">
      <div class="overview-grid" id="overview-grid"></div>

      <div class="price-footnote">
        <span>Prices as of Mar 3, 12:44 PM PST</span>
        <a href="https://polygon.io" target="_blank" rel="noopener">Polygon.io</a>
      </div>
    </section>

    <!-- Signals Feed Tab -->
    <section id="signals" class="tab-content">
      <div class="signals-feed" id="signals-feed"></div>
    </section>

    <!-- Matrix Tab -->
    <section id="matrix" class="tab-content">
      <div class="matrix-container" id="matrix-container"></div>
    </section>

    <!-- ETF Correlation Tab -->
    <section id="etf" class="tab-content">
      <div class="etf-container">
        <canvas id="etfChart"></canvas>
      </div>
    </section>

  </main>

  <!-- Loader -->
  <script src="loader.js"></script>

</body>
</html>
